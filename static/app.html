<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Istiqama</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:        #0d0d0d;
  --surface:   #141414;
  --surface2:  #1c1c1c;
  --teal:      #00f5d4;
  --teal-glow: 0 0 12px #00f5d480;
  --white:     #e8fffc;
  --muted:     #555;
  --danger:    #ff4d6d;
  --radius:    12px;
  --nav-h:     64px;
  --font:      'Inter', system-ui, sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--bg); color:var(--white); font-family:var(--font); font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; }
body { display:flex; flex-direction:column; overflow:hidden; }

.screen { display:none; flex-direction:column; height:calc(100vh - var(--nav-h)); overflow-y:auto; padding:16px 16px 8px; transition:opacity .15s; }
.screen.active { display:flex; }
.screen-header { font-size:13px; font-weight:600; letter-spacing:.08em; color:var(--teal); text-transform:uppercase; margin-bottom:14px; text-shadow:var(--teal-glow); }

.greeting { font-size:22px; font-weight:700; margin-bottom:4px; }
.greeting em { color:var(--teal); font-style:normal; text-shadow:var(--teal-glow); }
.sub { color:var(--muted); font-size:13px; margin-bottom:18px; }

.card { background:var(--surface); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; }
.card-title { font-weight:600; font-size:15px; margin-bottom:4px; }
.card-desc  { color:var(--muted); font-size:12px; margin-bottom:10px; }
.card-meta  { font-size:12px; color:var(--muted); }

.btn { display:inline-flex; align-items:center; justify-content:center; border:none; border-radius:10px; min-height:44px; padding:0 18px; font-family:var(--font); font-size:14px; font-weight:600; cursor:pointer; transition:opacity .15s,transform .1s; }
.btn:active { transform:scale(.97); }
.btn-teal   { background:var(--teal); color:#0d0d0d; box-shadow:var(--teal-glow); }
.btn-ghost  { background:var(--surface2); color:var(--white); }
.btn-danger { background:transparent; color:var(--danger); border:1px solid #ff4d6d33; }
.btn-full   { width:100%; }
.btn:disabled { opacity:.35; cursor:default; pointer-events:none; }
.btn-done   { background:transparent; color:var(--teal); border:1px solid #00f5d440; }

.answer-big   { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
.answer-big .btn { min-height:56px; font-size:16px; }
.answer-scale { display:flex; gap:8px; margin-top:12px; }
.answer-scale .btn { flex:1; min-height:52px; font-size:18px; }
.answer-poll  { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
.answer-poll  .btn { text-align:left; justify-content:flex-start; }
.answer-count { display:flex; gap:10px; margin-top:12px; }
.answer-count input { flex:1; background:var(--surface2); border:1px solid #333; border-radius:10px; color:var(--white); font-size:18px; font-family:var(--font); padding:0 14px; min-height:48px; outline:none; }
.answer-count input:focus { border-color:var(--teal); box-shadow:0 0 0 2px #00f5d430; }

.progress { background:#1e1e1e; border-radius:99px; height:8px; overflow:hidden; margin:8px 0; }
.progress-fill { background:var(--teal); height:100%; border-radius:99px; box-shadow:var(--teal-glow); transition:width .4s; }
.stat-row { display:flex; justify-content:space-between; font-size:13px; margin-top:4px; }
.stat-val  { color:var(--teal); font-weight:600; }
.streak    { font-size:13px; margin-top:6px; }

.lang-row { display:flex; gap:8px; margin-bottom:16px; }
.lang-row .btn { flex:1; border:1px solid #333; }
.lang-row .btn.active-lang { border-color:var(--teal); color:var(--teal); box-shadow:var(--teal-glow); }
.tz-block  { background:var(--surface); border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; }
.tz-label  { font-size:12px; color:var(--muted); margin-bottom:4px; }
.tz-val    { font-size:15px; font-weight:600; }

.empty  { text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }
.loader { text-align:center; color:var(--muted); padding:30px; font-size:14px; }

.bottom-nav { height:var(--nav-h); background:var(--surface); display:flex; border-top:1px solid #1f1f1f; padding-bottom:env(safe-area-inset-bottom); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:none; border:none; color:var(--muted); font-size:10px; font-family:var(--font); cursor:pointer; transition:color .15s; }
.nav-btn span:first-child { font-size:20px; }
.nav-btn.active { color:var(--teal); text-shadow:var(--teal-glow); filter:drop-shadow(0 0 6px #00f5d460); }

.overlay { position:fixed; inset:0; background:#000000cc; display:flex; align-items:flex-end; z-index:100; }
.overlay.hidden { display:none; }
.overlay-card { background:var(--surface); border-radius:var(--radius) var(--radius) 0 0; width:100%; padding:20px 16px 32px; max-height:80vh; overflow-y:auto; position:relative; }
.overlay-title    { font-size:16px; font-weight:700; margin-bottom:6px; }
.overlay-question { font-size:14px; color:var(--muted); margin-bottom:2px; }
.overlay-close    { position:absolute; top:14px; right:16px; background:var(--surface2); border:none; color:var(--muted); width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<!-- Screen: Home -->
<div id="screen-home" class="screen active">
  <div class="greeting" id="greeting">…</div>
  <div class="sub" data-i18n="webapp_subtitle">…</div>
  <div id="home-list"><div class="loader" data-i18n="webapp_loading">…</div></div>
</div>

<!-- Screen: Stats -->
<div id="screen-stats" class="screen">
  <div class="screen-header" data-i18n="webapp_header_stats">…</div>
  <div id="stats-list"><div class="loader" data-i18n="webapp_loading">…</div></div>
</div>

<!-- Screen: Challenges -->
<div id="screen-challenges" class="screen">
  <div class="screen-header" data-i18n="webapp_header_challenges">…</div>
  <div id="challenges-list"><div class="loader" data-i18n="webapp_loading">…</div></div>
</div>

<!-- Screen: Settings -->
<div id="screen-settings" class="screen">
  <div class="screen-header" data-i18n="webapp_header_settings">…</div>
  <div id="settings-content"><div class="loader" data-i18n="webapp_loading">…</div></div>
</div>

<!-- Answer Overlay -->
<div id="ov" class="overlay hidden">
  <div class="overlay-card">
    <button class="overlay-close" onclick="closeOv()">&#x2715;</button>
    <div class="overlay-title"    id="ov-title"></div>
    <div class="overlay-question" id="ov-question"></div>
    <div id="ov-inputs"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-target="screen-home"       onclick="nav('screen-home')">
    <span>&#x1F3E0;</span><span data-i18n="webapp_nav_today">…</span>
  </button>
  <button class="nav-btn"        data-target="screen-stats"      onclick="nav('screen-stats')">
    <span>&#x1F4CA;</span><span data-i18n="webapp_nav_stats">…</span>
  </button>
  <button class="nav-btn"        data-target="screen-challenges" onclick="nav('screen-challenges')">
    <span>&#x1F54C;</span><span data-i18n="webapp_nav_challenges">…</span>
  </button>
  <button class="nav-btn"        data-target="screen-settings"   onclick="nav('screen-settings')">
    <span>&#x2699;&#xFE0F;</span><span data-i18n="webapp_nav_settings">…</span>
  </button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
const HD = {'X-Telegram-Init-Data': tg.initData || '', 'Content-Type': 'application/json'};
let U = null, CH = [], T = {};

// ── API & i18n ────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(path, {headers: HD, ...opts});
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
function _(k, vars = {}) {
  let s = T[k] || k;
  for (const [key, val] of Object.entries(vars)) s = s.replace('{' + key + '}', val);
  return s;
}
function esc(s) {
  return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { const v = T[el.dataset.i18n]; if (v) el.textContent = v; });
}

// ── Navigation ────────────────────────────────────────────────────────────
const SCREENS = {'screen-stats': loadStats, 'screen-challenges': loadChallenges, 'screen-settings': loadSettings};
function nav(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.target === id));
  document.getElementById(id).classList.add('active');
  if (SCREENS[id]) SCREENS[id]();
}

// ── Home ──────────────────────────────────────────────────────────────────
function renderHome() {
  document.getElementById('greeting').innerHTML =
    _('webapp_greeting').replace('{name}', '<em>' + esc(U.display_name) + '</em>');
  const mine = CH.filter(c => c.participating);
  const el = document.getElementById('home-list');
  if (!mine.length) { el.innerHTML = '<div class="empty">' + _('webapp_no_participation') + '</div>'; return; }
  el.innerHTML = mine.map(c => {
    const done = c.answered_today, active = c.dispatched_today && !done;
    const cls = done ? 'btn-done' : active ? 'btn-teal' : 'btn-ghost';
    const txt = done ? _('webapp_btn_done') : active ? _('webapp_btn_answer') : _('webapp_btn_wait');
    return '<div class="card" id="hc-' + c.id + '">'
      + '<div class="card-title">' + esc(c.title) + '</div>'
      + (c.description ? '<div class="card-desc">' + esc(c.description) + '</div>' : '')
      + '<button class="btn ' + cls + ' btn-full"' + (!active && !done ? ' disabled' : '') + ' onclick="openAnswer(' + c.id + ')">' + txt + '</button>'
      + '</div>';
  }).join('');
}

// ── Stats ─────────────────────────────────────────────────────────────────
async function loadStats() {
  const el = document.getElementById('stats-list');
  el.innerHTML = '<div class="loader">' + _('webapp_loading') + '</div>';
  try {
    const stats = await api('/api/stats');
    if (!stats.length) { el.innerHTML = '<div class="empty">' + _('webapp_no_stats') + '</div>'; return; }
    el.innerHTML = stats.map(s =>
      '<div class="card">'
      + '<div class="card-title">' + esc(s.title) + '</div>'
      + '<div class="card-meta" style="margin-bottom:8px">' + esc(T['kind_' + s.kind] || s.kind) + '</div>'
      + renderStats(s.kind, s.stats)
      + '</div>'
    ).join('');
  } catch { el.innerHTML = '<div class="empty">' + _('webapp_error_load') + '</div>'; }
}

function renderStats(kind, s) {
  if (!s || !s.total_days) return '<div class="card-desc">' + _('webapp_no_answers_yet') + '</div>';
  if (kind === 'yes_no') {
    const pct = Math.round((s.yes_count || 0) / s.total_days * 100);
    return '<div class="progress"><div class="progress-fill" style="width:' + pct + '%"></div></div>'
      + '<div class="stat-row"><span>' + _('webapp_stat_yes_pct') + '</span><span class="stat-val">' + pct + '%</span></div>'
      + '<div class="stat-row"><span>' + _('webapp_stat_days') + '</span><span class="stat-val">' + s.total_days + '</span></div>'
      + '<div class="streak">' + _('webapp_stat_streak') + ': <span class="stat-val">' + (s.current_streak || 0) + ' \uD83D\uDD25</span>'
      + ' &nbsp; ' + _('webapp_stat_record') + ': <span class="stat-val">' + (s.max_streak || 0) + ' \uD83C\uDFC6</span></div>';
  }
  if (kind === 'count' || kind === 'scale_1_5') {
    return '<div class="stat-row"><span>' + _('webapp_stat_avg7') + '</span><span class="stat-val">' + (s.avg_7 || '—') + '</span></div>'
      + '<div class="stat-row"><span>' + _('webapp_stat_avg_all') + '</span><span class="stat-val">' + (s.avg_all || '—') + '</span></div>'
      + '<div class="stat-row"><span>' + _('webapp_stat_max') + '</span><span class="stat-val">' + (s.max_val || '—') + '</span></div>';
  }
  if (kind === 'poll') {
    const dist = s.distribution || {}, total = s.total_answers || 1;
    const rows = Object.entries(dist).sort((a, b) => b[1] - a[1]).slice(0, 3)
      .map(function(e) { return '<div class="stat-row"><span>' + esc(e[0]) + '</span><span class="stat-val">' + Math.round(e[1] / total * 100) + '%</span></div>'; }).join('');
    return rows || '<div class="card-desc">' + _('webapp_no_answers_yet') + '</div>';
  }
  return '';
}

// ── Challenges ────────────────────────────────────────────────────────────
async function loadChallenges() {
  const el = document.getElementById('challenges-list');
  el.innerHTML = '<div class="loader">' + _('webapp_loading') + '</div>';
  try {
    CH = await api('/api/challenges');
    renderChallengesList();
  } catch { el.innerHTML = '<div class="empty">' + _('webapp_error_load') + '</div>'; }
}

function renderChallengesList() {
  const el = document.getElementById('challenges-list');
  if (!CH.length) { el.innerHTML = '<div class="empty">' + _('webapp_no_challenges_list') + '</div>'; return; }
  el.innerHTML = CH.map(c =>
    '<div class="card" id="cc-' + c.id + '">'
    + '<div class="card-title">' + esc(c.title) + '</div>'
    + (c.description ? '<div class="card-desc">' + esc(c.description) + '</div>' : '')
    + '<div class="card-meta" style="margin-bottom:10px">' + esc(T['kind_' + c.kind] || c.kind) + '</div>'
    + (c.participating
        ? '<button class="btn btn-danger btn-full" onclick="toggleCh(' + c.id + ',\'leave\')">' + _('webapp_btn_leave') + '</button>'
        : '<button class="btn btn-teal  btn-full" onclick="toggleCh(' + c.id + ',\'join\')">'  + _('webapp_btn_join')  + '</button>')
    + '</div>'
  ).join('');
}

async function toggleCh(id, action) {
  const btn = document.querySelector('#cc-' + id + ' button');
  if (btn) btn.disabled = true;
  try {
    await api('/api/challenges/' + id + '/' + action, {method: 'POST'});
    const c = CH.find(function(x) { return x.id === id; });
    if (c) c.participating = action === 'join';
    renderChallengesList(); renderHome();
  } catch { if (btn) btn.disabled = false; }
}

// ── Settings ──────────────────────────────────────────────────────────────
async function loadSettings() {
  const el = document.getElementById('settings-content');
  try {
    U = await api('/api/me');
    const langs = [{c:'ru',l:'\uD83C\uDDF7\uD83C\uDDFA RU'},{c:'en',l:'\uD83C\uDDEC\uD83C\uDDE7 EN'},{c:'tt',l:'\uD83C\uDFF4 TT'}];
    el.innerHTML = '<div style="font-size:12px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">'
      + _('webapp_lang_header') + '</div>'
      + '<div class="lang-row">'
      + langs.map(function(x) { return '<button class="btn btn-ghost' + (U.lang === x.c ? ' active-lang' : '') + '" onclick="setLang(\'' + x.c + '\')">' + x.l + '</button>'; }).join('')
      + '</div>'
      + '<div class="tz-block"><div class="tz-label">' + _('webapp_tz_label') + '</div><div class="tz-val">' + esc(U.timezone) + '</div></div>'
      + '<button class="btn btn-ghost btn-full" onclick="sendLoc()">' + _('webapp_btn_location') + '</button>';
  } catch { el.innerHTML = '<div class="empty">' + _('webapp_error_load') + '</div>'; }
}

async function setLang(lang) {
  await api('/api/settings', {method: 'POST', body: JSON.stringify({lang: lang})});
  T = await api('/api/i18n');
  applyI18n();
  loadSettings();
}

function sendLoc() {
  if (typeof tg.requestLocation === 'function') {
    tg.requestLocation(function(loc) {
      if (!loc) return;
      fetch('https://timeapi.io/api/TimeZone/coordinate?latitude=' + loc.latitude + '&longitude=' + loc.longitude)
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(d) {
          if (d && d.timeZone) {
            api('/api/settings', {method: 'POST', body: JSON.stringify({timezone: d.timeZone})})
              .then(function() { loadSettings(); });
          }
        }).catch(function() {});
    });
  }
}

// ── Answer overlay ────────────────────────────────────────────────────────
function openAnswer(cid) {
  const c = CH.find(function(x) { return x.id === cid; });
  if (!c || c.answered_today) return;
  document.getElementById('ov-title').textContent    = c.title;
  document.getElementById('ov-question').textContent = c.question;
  document.getElementById('ov-inputs').innerHTML     = buildInputs(c);
  document.getElementById('ov').classList.remove('hidden');
}
function closeOv() { document.getElementById('ov').classList.add('hidden'); }

function buildInputs(c) {
  if (c.kind === 'yes_no') return '<div class="answer-big">'
    + '<button class="btn btn-teal"  onclick="submit(' + c.id + ',\'yes\')">' + _('btn_yes') + '</button>'
    + '<button class="btn btn-ghost" onclick="submit(' + c.id + ',\'no\')">'  + _('btn_no')  + '</button>'
    + '</div>';
  if (c.kind === 'scale_1_5') return '<div class="answer-scale">'
    + [1,2,3,4,5].map(function(i) { return '<button class="btn btn-ghost" onclick="submit(' + c.id + ',' + i + ')">' + i + '</button>'; }).join('')
    + '</div>';
  if (c.kind === 'poll' && c.options.length) return '<div class="answer-poll">'
    + c.options.map(function(o, i) { return '<button class="btn btn-ghost" onclick="submit(' + c.id + ',' + i + ')">' + esc(o) + '</button>'; }).join('')
    + '</div>';
  if (c.kind === 'count') return '<div class="answer-count">'
    + '<input type="number" id="cin" min="0" placeholder="0">'
    + '<button class="btn btn-teal" onclick="submit(' + c.id + ', parseInt(document.getElementById(\'cin\').value)||0)">' + _('webapp_btn_submit') + '</button>'
    + '</div>';
  return '';
}

async function submit(cid, value) {
  document.querySelectorAll('#ov-inputs button, #ov-inputs input').forEach(function(b) { b.disabled = true; });
  try {
    const res = await api('/api/answer', {method: 'POST', body: JSON.stringify({challenge_id: cid, value: value})});
    if (res.ok) {
      const c = CH.find(function(x) { return x.id === cid; });
      if (c) c.answered_today = true;
      closeOv(); renderHome();
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    } else {
      document.getElementById('ov-inputs').insertAdjacentHTML('beforeend',
        '<p style="color:var(--danger);margin-top:10px;font-size:13px">' + _('webapp_already_answered') + '</p>');
    }
  } catch {
    document.querySelectorAll('#ov-inputs button, #ov-inputs input').forEach(function(b) { b.disabled = false; });
  }
}

// ── Init: load me + i18n + challenges in parallel ─────────────────────────
async function init() {
  try {
    var results = await Promise.all([api('/api/me'), api('/api/i18n'), api('/api/challenges')]);
    U = results[0]; T = results[1]; CH = results[2];
    applyI18n();
    renderHome();
  } catch {
    document.getElementById('home-list').innerHTML = '<div class="empty">&#x26A0;&#xFE0F; Auth error</div>';
  }
}

init();
</script>
</body>
</html>
