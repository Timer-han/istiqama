version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: istiqama
      POSTGRES_USER: istiqama
      POSTGRES_PASSWORD: istiqama
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U istiqama -d istiqama"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://istiqama:istiqama@db:5432/istiqama
      ADMIN_IDS: ${ADMIN_IDS:-}
      SCHEDULER_INTERVAL: ${SCHEDULER_INTERVAL:-60}
    env_file:
      - .env

volumes:
  postgres_data:
